{%- assign page_paths = site.header_pages | default: default_paths -%}
<header class="menu">
  <center>
    <img src="../assets/img/header.png" Alt="Project title - From Studios to Servers: Connecting Creative and Academic Computation">
      <ul>
        {%- for path in page_paths -%}
          {%- assign my_page = site.pages | where: "path", path | first -%}
          {%- if my_page.title -%}
          <li><a href="{{ my_page.url | relative_url }}"><span id="menu-label">{{ my_page.title | escape }}</span></a></li>
          {%- endif -%}
        {%- endfor -%}
      </ul>
  </center>
</header>
